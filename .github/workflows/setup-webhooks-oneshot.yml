name: Setup Webhooks (one-shot)

on:
  workflow_dispatch:
    inputs:
      admin_pat:
        description: 'GitHub PAT with repo scope (admin access to all 12 repos)'
        required: true
        type: string
      webhook_secret:
        description: 'Webhook secret (same as GITHUB_WEBHOOK_SECRET on Vercel)'
        required: true
        type: string

jobs:
  setup-webhooks:
    runs-on: ubuntu-latest
    steps:
      - name: Configure push webhook on all monitored repos
        env:
          ADMIN_PAT: ${{ inputs.admin_pat }}
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
        run: |
          set -euo pipefail

          REPOS=(
            "soli-agent"
            "casa-mia-be"
            "casa-mia-fe"
            "bachelor-party-claudiano"
            "solids"
            "soli-dm-be"
            "soli-dm-fe"
            "soli-dome"
            "pippify"
            "soli-platform"
            "koollector"
            "health-wand-and-fire"
          )

          WEBHOOK_ENDPOINT="https://soli-prof.vercel.app/api/webhooks/github"

          printf "\n%-34s %-8s %-40s %s\n" "repo" "HTTP" "outcome" "hook_id"
          printf "%0.s-" {1..95}
          echo ""

          for REPO in "${REPOS[@]}"; do
            PAYLOAD=$(printf '{
              "name": "web",
              "active": true,
              "events": ["push"],
              "config": {
                "url": "%s",
                "content_type": "json",
                "secret": "%s",
                "insecure_ssl": "0"
              }
            }' "$WEBHOOK_ENDPOINT" "$WEBHOOK_SECRET")

            HTTP_STATUS=$(curl -s -o /tmp/resp_body.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${ADMIN_PAT}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "User-Agent: soli-webhook-setup" \
              -d "$PAYLOAD" \
              "https://api.github.com/repos/soli92/${REPO}/hooks")

            RESP_BODY=$(cat /tmp/resp_body.json)
            HOOK_ID="-"

            if [ "$HTTP_STATUS" = "201" ]; then
              HOOK_ID=$(python3 -c "import sys,json; d=json.loads('''${RESP_BODY}'''); print(d.get('id','-'))" 2>/dev/null || echo "-")
              OUTCOME="[OK] created"
            elif [ "$HTTP_STATUS" = "422" ] && echo "$RESP_BODY" | grep -q "Hook already exists"; then
              OUTCOME="[SKIP] already_exists"
            elif [ "$HTTP_STATUS" = "401" ]; then
              OUTCOME="[ERR] 401 unauthorized"
              printf "%-34s %-8s %-40s %s\n" "$REPO" "$HTTP_STATUS" "$OUTCOME" "$HOOK_ID"
              echo "STOP: Token unauthorized. Aborting."
              exit 1
            elif [ "$HTTP_STATUS" = "404" ]; then
              OUTCOME="[ERR] 404 not found / no permissions"
            elif [ "$HTTP_STATUS" = "422" ]; then
              MSG=$(python3 -c "import sys,json; d=json.loads(sys.stdin.read()); errs=d.get('errors',[]); print((errs[0].get('message','') if errs else d.get('message',''))[:60])" 2>/dev/null <<< "$RESP_BODY" || echo "unknown 422")
              OUTCOME="[WARN] 422: ${MSG}"
            else
              MSG=$(python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(str(d.get('message',''))[:60])" 2>/dev/null <<< "$RESP_BODY" || echo "unknown")
              OUTCOME="[ERR] ${HTTP_STATUS}: ${MSG}"
            fi

            printf "%-34s %-8s %-40s %s\n" "$REPO" "$HTTP_STATUS" "$OUTCOME" "$HOOK_ID"
          done

          echo ""
          echo "Done."
