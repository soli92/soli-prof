name: Setup Webhooks (one-shot)

on:
  workflow_dispatch:

jobs:
  setup-webhooks:
    runs-on: ubuntu-latest
    steps:
      - name: Configure push webhook on all monitored repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${WEBHOOK_SECRET}" ]; then
            echo "STOP: GITHUB_WEBHOOK_SECRET secret not set. Aborting."
            exit 1
          fi

          REPOS=(
            "soli-agent"
            "casa-mia-be"
            "casa-mia-fe"
            "bachelor-party-claudiano"
            "solids"
            "soli-dm-be"
            "soli-dm-fe"
            "soli-dome"
            "pippify"
            "soli-platform"
            "koollector"
            "health-wand-and-fire"
          )

          WEBHOOK_ENDPOINT="https://soli-prof.vercel.app/api/webhooks/github"

          printf "\n%-34s %-8s %-40s %s\n" "repo" "HTTP" "outcome" "hook_id"
          printf "%s\n" "$(printf '%.0s-' {1..95})"

          for REPO in "${REPOS[@]}"; do
            HTTP_STATUS=$(curl -s -o /tmp/resp_body.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "User-Agent: soli-webhook-setup" \
              --data-binary @- \
              "https://api.github.com/repos/soli92/${REPO}/hooks" <<PAYLOAD
          {
            "name": "web",
            "active": true,
            "events": ["push"],
            "config": {
              "url": "${WEBHOOK_ENDPOINT}",
              "content_type": "json",
              "secret": "${WEBHOOK_SECRET}",
              "insecure_ssl": "0"
            }
          }
          PAYLOAD
            )

            RESP_BODY=$(cat /tmp/resp_body.json)
            HOOK_ID="-"

            if [ "$HTTP_STATUS" = "201" ]; then
              HOOK_ID=$(echo "$RESP_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id','-'))" 2>/dev/null || echo "-")
              OUTCOME="[OK] created"
            elif [ "$HTTP_STATUS" = "422" ] && echo "$RESP_BODY" | grep -q "Hook already exists"; then
              OUTCOME="[SKIP] already_exists"
            elif [ "$HTTP_STATUS" = "401" ]; then
              OUTCOME="[ERR] 401 unauthorized"
              printf "%-34s %-8s %-40s %s\n" "$REPO" "$HTTP_STATUS" "$OUTCOME" "$HOOK_ID"
              echo "STOP: Token unauthorized. Aborting."
              exit 1
            elif [ "$HTTP_STATUS" = "404" ]; then
              OUTCOME="[ERR] 404 not found / no permissions"
            elif [ "$HTTP_STATUS" = "422" ]; then
              MSG=$(echo "$RESP_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); errs=d.get('errors',[]); print(errs[0].get('message','') if errs else d.get('message',''))" 2>/dev/null | head -c 60 || echo "unknown 422")
              OUTCOME="[WARN] 422: ${MSG}"
            else
              MSG=$(echo "$RESP_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('message','')[:60])" 2>/dev/null || echo "unknown")
              OUTCOME="[ERR] ${HTTP_STATUS}: ${MSG}"
            fi

            printf "%-34s %-8s %-40s %s\n" "$REPO" "$HTTP_STATUS" "$OUTCOME" "$HOOK_ID"
          done

          echo ""
          echo "Done."
